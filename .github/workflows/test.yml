name: Tests

on:
  push:
    branches:
      - main
      - "feature/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend-ts/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-ts ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Lint backend
        run: npm --prefix backend-ts run lint

      - name: Typecheck backend
        run: npm --prefix backend-ts run typecheck

      - name: Test backend
        run: npm --prefix backend-ts test

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Smoke-test npm package
        run: npm --prefix backend-ts run pack:smoke
