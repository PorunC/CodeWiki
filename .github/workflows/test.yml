name: Tests

on:
  push:
    branches:
      - main
      - "feature/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: codewiki_test
          POSTGRES_USER: codewiki
          POSTGRES_PASSWORD: codewiki
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U codewiki -d codewiki_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      CODEWIKI_TEST_POSTGRES_URL: postgresql+psycopg://codewiki:codewiki@127.0.0.1:5432/codewiki_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Lint backend
        run: python -m ruff check backend tests

      - name: Test backend
        run: python -m pytest -q

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*
