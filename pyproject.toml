# Python utility-script tooling configuration.
#
# The backend and publishable package live in backend as the codewiki-backend
# npm package. This file only configures Python checks for repository utility
# scripts and their tests; it is not a Python package manifest.

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests/scripts"]
pythonpath = ["."]
